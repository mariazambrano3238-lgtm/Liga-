name: Compilar APK Definitivo

on:
  push:
    branches:
      - principal
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalar Gradle de forma global
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Detectar Carpeta y Compilar APK
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -n "$SETTINGS_PATH" ]; then
          DIR_PATH=$(dirname "$SETTINGS_PATH")
          echo "¡Proyecto detectado en: $DIR_PATH!"
          cd "$DIR_PATH"
          gradle assembleDebug --no-daemon
        else
          echo "No se encontro un proyecto valido de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"        else
          echo "No se encontro un proyecto valido de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"        else
          echo "No se encontro un proyecto valido de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"        else
          echo "No se encontró un proyecto válido de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"        path: aplicación/app/build/outputs/apk/debug/*.apk
    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
