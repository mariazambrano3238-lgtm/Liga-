name: Compilar APK de Android

on:
  push:
    branches: [ "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Forzar Gradle compatible y Compilar
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5' # Forzamos una versión estable y compatible con Java 17

    - name: Ejecutar Compilación
      run: |
        if [ -d "app" ]; then
          gradle assembleDebug --no-daemon
        elif [ -d "aplicación" ]; then
          cd aplicación
          gradle assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
