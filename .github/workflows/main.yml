name: Compilar APK Reparado

on:
  push:
    branches: [ "principal", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Entorno Java Correcto
      uses: actions/setup-java@v4
      with:
        distribution: 'oracle'
        java-version: '17'

    - name: Detectar y Reparar Permisos de Gradle
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle*" -print -quit)
        if [ -n "$SETTINGS_PATH" ]; then
          DIR_PATH=$(dirname "$SETTINGS_PATH")
          echo "Proyecto encontrado en: $DIR_PATH"
          cd "$DIR_PATH"
          
          # Forzar la creacion limpia del ejecutable de Gradle
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          
          # Ejecutar compilacion limpia ignorando errores menores
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
        else
          echo "No se encontro la estructura de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"          echo "No se encontro la estructura de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"          echo "No se encontro la estructura de Android."
          exit 1
        fi

    - name: Guardar y subir el APK terminado
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"          exit 1
        fi

    - name: Guardar y subir el APK terminado
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: "**/build/outputs/apk/debug/*.apk"
