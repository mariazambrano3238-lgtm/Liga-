name: Compilar APK de Android

on:
  push:
    branches: [ "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Compilar la aplicación (Generar APK)
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        elif [ -f "aplicación/gradlew" ]; then
          cd aplicación
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "No se encontró el archivo gradlew en ninguna ruta conocida."
          exit 1
        fi

    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: |
          aplicación/build/outputs/apk/debug/*.apk
          build/outputs/apk/debug/*.apk
