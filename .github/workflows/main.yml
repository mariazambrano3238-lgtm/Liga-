name: Compilar APK de Android

on:
  push:
    branches: [ "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle y Compilar
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper # Esto fuerza al servidor a usar la versión correcta de forma externa

    - name: Forzar Compilación de la App
      run: |
        if [ -d "app" ]; then
          gradle assembleDebug
        elif [ -d "aplicación" ]; then
          cd aplicación
          gradle assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
