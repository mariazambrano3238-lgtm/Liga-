name: Compilar APK Nativo

on:
  push:
    branches: [ "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generar e instalar Gradle manualmente
      run: |
        cd aplicación
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Compilar APK de Android
      run: |
        cd aplicación
        ./gradlew assembleDebug --no-daemon

    - name: Guardar y subir el APK
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-torneo-apk
        path: aplicación/app/build/outputs/apk/debug/*.apk
    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
