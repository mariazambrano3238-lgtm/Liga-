name: Compilar APK de Android

on:
  push:
    branches: [ "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Buscar y Compilar de forma automática
      run: |
        # Buscar el archivo gradlew en cualquier rincón del repositorio
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -n "$GRADLEW_PATH" ]; then
          echo "¡Archivo gradlew encontrado en: $GRADLEW_PATH!"
          # Extraer la carpeta donde está guardado
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "ERROR: No se encontró el archivo gradlew por ningún lado."
          exit 1
        fi

    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: "**/build/outputs/apk/debug/*.apk"
    - name: Subir archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: app-torneo-debug
        path: |
          aplicación/build/outputs/apk/debug/*.apk
          build/outputs/apk/debug/*.apk
